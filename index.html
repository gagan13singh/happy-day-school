<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Happy Day School – Where Learning is Fun!</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌈</text></svg>" />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fredoka+One&display=swap"
    rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
      scroll-padding-top: 80px;
    }

    body {
      font-family: 'Nunito', sans-serif;
      background: #fffbf0;
      overflow-x: hidden;
    }

    @keyframes float {

      0%,
      100% {
        transform: translateY(0)
      }

      50% {
        transform: translateY(-14px)
      }
    }

    @keyframes spin-slow {
      from {
        transform: rotate(0)
      }

      to {
        transform: rotate(360deg)
      }
    }

    @keyframes bounce-in {
      0% {
        transform: scale(0.3);
        opacity: 0
      }

      60% {
        transform: scale(1.1)
      }

      80% {
        transform: scale(0.95)
      }

      100% {
        transform: scale(1);
        opacity: 1
      }
    }

    @keyframes slide-up {
      from {
        transform: translateY(60px);
        opacity: 0
      }

      to {
        transform: translateY(0);
        opacity: 1
      }
    }

    @keyframes wiggle {

      0%,
      100% {
        transform: rotate(-5deg)
      }

      50% {
        transform: rotate(5deg)
      }
    }

    @keyframes pulse-ring {
      0% {
        box-shadow: 0 0 0 0 rgba(255, 180, 0, 0.5)
      }

      70% {
        box-shadow: 0 0 0 20px rgba(255, 180, 0, 0)
      }

      100% {
        box-shadow: 0 0 0 0 rgba(255, 180, 0, 0)
      }
    }

    @keyframes marquee {
      from {
        transform: translateX(0)
      }

      to {
        transform: translateX(-50%)
      }
    }

    @keyframes pop {
      0% {
        transform: scale(1)
      }

      50% {
        transform: scale(1.2)
      }

      100% {
        transform: scale(1)
      }
    }

    @keyframes rainbow {
      0% {
        color: #ff6b6b
      }

      20% {
        color: #ffa600
      }

      40% {
        color: #51cf66
      }

      60% {
        color: #339af0
      }

      80% {
        color: #cc5de8
      }

      100% {
        color: #ff6b6b
      }
    }

    .float {
      animation: float 3s ease-in-out infinite;
    }

    .spin-slow {
      animation: spin-slow 12s linear infinite;
    }

    .wiggle {
      animation: wiggle 2s ease-in-out infinite;
    }

    .bounce-in {
      animation: bounce-in 0.8s cubic-bezier(0.36, 0.07, 0.19, 0.97) both;
    }

    .slide-up {
      animation: slide-up 0.7s ease both;
    }

    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: #fff3d4;
    }

    ::-webkit-scrollbar-thumb {
      background: #ffa600;
      border-radius: 4px;
    }

    .nav-link {
      transition: color 0.2s, transform 0.2s;
    }

    .nav-link:hover {
      transform: translateY(-2px);
      color: #ff6b6b !important;
    }

    .card-hover {
      transition: transform 0.3s, box-shadow 0.3s;
    }

    .card-hover:hover {
      transform: translateY(-8px) rotate(-1deg);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15) !important;
    }

    .btn-bounce:hover {
      animation: pop 0.3s ease;
    }

    .star {
      display: inline-block;
      color: #ffd700;
    }
  </style>
</head>

<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ── Floating decorations
    const Deco = ({ emoji, style }) => (
      <span style={{ position: 'absolute', fontSize: 28, pointerEvents: 'none', userSelect: 'none', zIndex: 0, animation: `float ${2 + Math.random() * 2}s ease-in-out infinite`, ...style }}>{emoji}</span>
    );

    // ── Navbar
    function Navbar() {
      const [open, setOpen] = useState(false);
      const [scrolled, setScrolled] = useState(false);
      useEffect(() => {
        const h = () => setScrolled(window.scrollY > 40);
        window.addEventListener('scroll', h);
        return () => window.removeEventListener('scroll', h);
      }, []);
      const links = ['Home', 'About', 'Programs', 'Gallery', 'Admissions', 'Contact'];
      return (
        <nav style={{
          position: 'fixed', top: 0, left: 0, right: 0, zIndex: 1000,
          background: scrolled ? 'rgba(255,255,255,0.97)' : 'transparent',
          boxShadow: scrolled ? '0 4px 20px rgba(0,0,0,0.08)' : 'none',
          transition: 'all 0.3s', padding: '0 5%',
          display: 'flex', alignItems: 'center', justifyContent: 'space-between', height: 70
        }}>
          <a href="#home" style={{ display: 'flex', alignItems: 'center', gap: 10, textDecoration: 'none' }}>
            <span style={{ fontSize: 36 }}>🌈</span>
            <div>
              <div style={{ fontFamily: 'Fredoka One', fontSize: 22, color: '#ff6b6b', lineHeight: 1.1 }}>Happy Day</div>
              <div style={{ fontFamily: 'Fredoka One', fontSize: 13, color: '#ffa600', letterSpacing: 1 }}>SCHOOL</div>
            </div>
          </a>

          {/* Desktop links */}
          <div style={{ display: 'flex', gap: 28, alignItems: 'center' }} className="desktop-nav">
            {links.map(l => (
              <a key={l} href={`#${l.toLowerCase()}`} className="nav-link"
                style={{ textDecoration: 'none', color: '#444', fontWeight: 700, fontSize: 15 }}>{l}</a>
            ))}
            <a href="#admissions" style={{
              background: 'linear-gradient(135deg,#ff6b6b,#ffa600)',
              color: '#fff', padding: '10px 22px', borderRadius: 50,
              textDecoration: 'none', fontWeight: 800, fontSize: 14,
              boxShadow: '0 4px 15px rgba(255,107,107,0.4)', transition: 'transform 0.2s'
            }} className="btn-bounce">Enroll Now ✨</a>
          </div>

          {/* Mobile hamburger */}
          <button onClick={() => setOpen(!open)} style={{
            display: 'none', background: 'none', border: 'none', fontSize: 28, cursor: 'pointer'
          }} id="ham">☰</button>

          {open && (
            <div style={{
              position: 'absolute', top: 70, left: 0, right: 0,
              background: '#fff', padding: '20px 5%', boxShadow: '0 8px 30px rgba(0,0,0,0.1)'
            }}>
              {links.map(l => (
                <a key={l} href={`#${l.toLowerCase()}`} onClick={() => setOpen(false)}
                  style={{ display: 'block', padding: '12px 0', textDecoration: 'none', color: '#444', fontWeight: 700, borderBottom: '1px dashed #eee' }}>{l}</a>
              ))}
            </div>
          )}
        </nav>
      );
    }

    // ── Hero
    function Hero() {
      return (
        <section id="home" style={{
          minHeight: '100vh', position: 'relative', overflow: 'hidden',
          background: 'linear-gradient(160deg, #fff9e0 0%, #ffecd2 40%, #ffcce0 100%)',
          display: 'flex', alignItems: 'center', justifyContent: 'center', paddingTop: 80
        }}>
          {/* Big blobs */}
          <div style={{ position: 'absolute', width: 500, height: 500, borderRadius: '50%', background: 'rgba(255,107,107,0.1)', top: -100, right: -100, animation: 'spin-slow 20s linear infinite' }} className="spin-slow" />
          <div style={{ position: 'absolute', width: 350, height: 350, borderRadius: '50%', background: 'rgba(81,207,102,0.1)', bottom: -80, left: -80 }} />

          {/* Floating emojis */}
          {[['🌟', '10%', '20%'], ['🎈', '85%', '15%'], ['🦋', '15%', '75%'], ['🌸', '80%', '70%'], ['🐣', '50%', '10%'], ['🎨', '5%', '50%'], ['🌈', '90%', '50%'], ['🎀', '40%', '85%']].map(([e, l, t], i) => (
            <Deco key={i} emoji={e} style={{ left: l, top: t, animationDelay: `${i * 0.4}s` }} />
          ))}

          <div style={{ textAlign: 'center', maxWidth: 780, padding: '0 20px', position: 'relative', zIndex: 1 }}>
            <div className="bounce-in" style={{ display: 'inline-block', background: 'rgba(255,255,255,0.7)', borderRadius: 50, padding: '8px 22px', marginBottom: 20, backdropFilter: 'blur(10px)', border: '2px solid rgba(255,166,0,0.3)' }}>
              <span style={{ fontSize: 14, fontWeight: 800, color: '#ffa600', letterSpacing: 1 }}>🎉 ADMISSIONS OPEN 2026–27</span>
            </div>

            <h1 className="slide-up" style={{ fontFamily: 'Fredoka One', fontSize: 'clamp(44px, 8vw, 88px)', lineHeight: 1.1, marginBottom: 16, animationDelay: '0.1s' }}>
              <span style={{ color: '#ff6b6b' }}>Where</span> Little{' '}
              <span style={{ color: '#ffa600', display: 'inline-block', animation: 'wiggle 2s ease-in-out infinite' }}>Stars</span>{' '}
              <span style={{ color: '#51cf66' }}>Shine</span> 🌟
            </h1>

            <p className="slide-up" style={{ fontSize: 'clamp(16px,2.5vw,20px)', color: '#666', lineHeight: 1.7, marginBottom: 36, maxWidth: 580, margin: '0 auto 36px', animationDelay: '0.2s' }}>
              A nurturing, playful, and joyful environment where every child blossoms. Play-based learning for ages 2–6 in the heart of Delhi NCR.
            </p>

            <div className="slide-up" style={{ display: 'flex', gap: 16, justifyContent: 'center', flexWrap: 'wrap', animationDelay: '0.3s' }}>
              <a href="#admissions" style={{
                background: 'linear-gradient(135deg,#ff6b6b,#ffa600)', color: '#fff',
                padding: '16px 36px', borderRadius: 50, textDecoration: 'none',
                fontWeight: 800, fontSize: 17, boxShadow: '0 8px 25px rgba(255,107,107,0.45)',
                animation: 'pulse-ring 2s infinite', display: 'inline-block'
              }}>🎒 Apply Now</a>
              <a href="#programs" style={{
                background: 'rgba(255,255,255,0.9)', color: '#ff6b6b',
                padding: '16px 36px', borderRadius: 50, textDecoration: 'none',
                fontWeight: 800, fontSize: 17, border: '2px solid #ff6b6b',
                backdropFilter: 'blur(10px)'
              }}>📚 Our Programs</a>
            </div>

            {/* Stats row */}
            <div className="slide-up" style={{ display: 'flex', gap: 32, justifyContent: 'center', marginTop: 56, flexWrap: 'wrap', animationDelay: '0.4s' }}>
              {[['500+', 'Happy Kids'], ['15+', 'Years of Joy'], ['30+', 'Activities'], ['98%', 'Parent Satisfaction']].map(([n, l]) => (
                <div key={l} style={{ textAlign: 'center' }}>
                  <div style={{ fontFamily: 'Fredoka One', fontSize: 32, color: '#ff6b6b' }}>{n}</div>
                  <div style={{ fontSize: 13, color: '#888', fontWeight: 700 }}>{l}</div>
                </div>
              ))}
            </div>
          </div>

          {/* Bottom wave */}
          <svg viewBox="0 0 1440 80" style={{ position: 'absolute', bottom: 0, left: 0, right: 0, width: '100%' }} preserveAspectRatio="none">
            <path d="M0,40 C360,80 1080,0 1440,40 L1440,80 L0,80 Z" fill="#fffbf0" />
          </svg>
        </section>
      );
    }

    // ── Marquee banner
    function Banner() {
      const items = ['🎨 Art & Craft', '🎵 Music & Dance', '📚 Pre-Reading', '🌱 Nature Play', '🧩 Puzzles & Logic', '🤸 Yoga & Movement', '🎭 Dramatics', '🔬 Science Discovery', '🏏 Sports Fun', '🎤 Show & Tell'];
      return (
        <div style={{ background: 'linear-gradient(135deg,#ff6b6b,#ffa600)', padding: '14px 0', overflow: 'hidden', position: 'relative' }}>
          <div style={{ display: 'flex', animation: 'marquee 25s linear infinite', width: '200%' }}>
            {[...items, ...items].map((item, i) => (
              <span key={i} style={{ color: '#fff', fontWeight: 800, fontSize: 15, whiteSpace: 'nowrap', paddingRight: 48 }}>{item}</span>
            ))}
          </div>
        </div>
      );
    }

    // ── About
    function About() {
      return (
        <section id="about" style={{ padding: '90px 5%', background: '#fffbf0', position: 'relative', overflow: 'hidden' }}>
          <Deco emoji="🌻" style={{ right: '5%', top: '10%', fontSize: 60, opacity: 0.3 }} />
          <Deco emoji="🦄" style={{ left: '3%', bottom: '10%', fontSize: 50, opacity: 0.25 }} />

          <div style={{ maxWidth: 1100, margin: '0 auto', display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 60, alignItems: 'center' }}>
            {/* Illustration side */}
            <div style={{ position: 'relative', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center' }}>
              <div style={{ width: 300, height: 300, borderRadius: '50%', background: 'linear-gradient(135deg,#ffd3e8,#ffecd2)', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 130, animation: 'float 4s ease-in-out infinite', boxShadow: '0 20px 60px rgba(255,107,107,0.2)', overflow: 'hidden' }}>
                <img src="images/about.png" alt="Mrs. Ranjeet Kaur - Principal" style={{ width: '100%', height: '100%', objectFit: 'cover' }} onError={(e) => { e.target.style.display = 'none'; e.target.nextSibling.style.display = 'block' }} />
                <span style={{ display: 'none' }}>🏫</span>
              </div>
              <div style={{ marginTop: 20, background: '#fff', padding: '10px 24px', borderRadius: 50, boxShadow: '0 10px 30px rgba(0,0,0,0.08)', display: 'flex', alignItems: 'center', gap: 12, zIndex: 1, animation: 'slide-up 0.7s ease both', animationDelay: '0.2s' }}>
                <div style={{ fontSize: 22 }}>👩‍🏫</div>
                <div>
                  <div style={{ fontWeight: 800, color: '#2d2d2d', fontSize: 15 }}>Mrs. Ranjeet Kaur</div>
                  <div style={{ color: '#ff6b6b', fontSize: 11, fontWeight: 800, letterSpacing: 0.5 }}>OUR PRINCIPAL</div>
                </div>
              </div>
              {[['🎈', 'top:10%,right:5%'], ['⭐', 'bottom:15%,left:5%'], ['🌸', 'top:50%,right:0']].map(([e, pos], i) => (
                <div key={i} style={{
                  position: 'absolute', fontSize: 32, animation: `float ${2 + i}s ease-in-out infinite`, animationDelay: `${i * 0.5}s`,
                  ...Object.fromEntries(pos.split(',').map(p => p.split(':')))
                }}>{e}</div>
              ))}
            </div>

            <div>
              <div style={{ display: 'inline-block', background: '#fff3d4', borderRadius: 50, padding: '6px 18px', marginBottom: 16 }}>
                <span style={{ color: '#ffa600', fontWeight: 800, fontSize: 13 }}>🌟 ABOUT US</span>
              </div>
              <h2 style={{ fontFamily: 'Fredoka One', fontSize: 'clamp(30px,4vw,48px)', color: '#2d2d2d', marginBottom: 16, lineHeight: 1.2 }}>
                A Second Home for Your Little One 💛
              </h2>
              <p style={{ color: '#666', lineHeight: 1.8, fontSize: 16, marginBottom: 20 }}>
                Happy Day School was founded with a simple belief: <strong>every child is born curious</strong>. Our play-based curriculum nurtures that curiosity through structured yet joyful experiences designed for ages 2 to 6.
              </p>
              <p style={{ color: '#666', lineHeight: 1.8, fontSize: 16, marginBottom: 28 }}>
                Located in Delhi NCR, we provide a <strong>safe, inclusive, and stimulating</strong> environment where children develop social, emotional, cognitive and physical skills — all while having an absolute blast!
              </p>
              {[['🏆', 'Award-winning curriculum designed by child psychologists'], ['❤️', 'Low student-to-teacher ratio (1:8) for personalised care'], ['🌍', 'Celebrating diversity, culture, and creativity every day']].map(([icon, text]) => (
                <div key={text} style={{ display: 'flex', gap: 12, alignItems: 'flex-start', marginBottom: 12 }}>
                  <span style={{ fontSize: 22, flexShrink: 0, marginTop: 2 }}>{icon}</span>
                  <span style={{ color: '#555', fontWeight: 600, lineHeight: 1.5 }}>{text}</span>
                </div>
              ))}
            </div>
          </div>
        </section>
      );
    }

    // ── Programs
    function Programs() {
      const programs = [
        { emoji: '🐣', name: 'Playgroup', age: '2–3 yrs', color: '#ffecf0', accent: '#ff6b6b', desc: 'Sensory play, music, art, and making first friends in a loving environment.' },
        { emoji: '🌱', name: 'Nursery', age: '3–4 yrs', color: '#e8faf0', accent: '#51cf66', desc: 'Early literacy, numeracy, nature exploration and creative expression.' },
        { emoji: '🚀', name: 'LKG', age: '4–5 yrs', color: '#fff3d4', accent: '#ffa600', desc: 'School readiness, phonics, basic maths, science wonder & leadership skills.' },
        { emoji: '⭐', name: 'UKG', age: '5–6 yrs', color: '#eef4ff', accent: '#339af0', desc: 'Advanced language, logic, project work and confident communication.' },
        { emoji: '🎨', name: 'After-School Art', age: 'All ages', color: '#fdf4ff', accent: '#cc5de8', desc: 'Painting, craft, sculpture, and mixed media for budding Picassos.' },
        { emoji: '🎵', name: 'Music & Dance', age: 'All ages', color: '#fff9db', accent: '#f59f00', desc: 'Classical, folk, Bollywood rhythms, and creative movement classes.' },
      ];
      return (
        <section id="programs" style={{ padding: '90px 5%', background: 'linear-gradient(180deg,#f0f8ff,#fff9f0)', position: 'relative' }}>
          <div style={{ textAlign: 'center', marginBottom: 56 }}>
            <div style={{ display: 'inline-block', background: '#e8faf0', borderRadius: 50, padding: '6px 18px', marginBottom: 12 }}>
              <span style={{ color: '#51cf66', fontWeight: 800, fontSize: 13 }}>📚 PROGRAMS</span>
            </div>
            <h2 style={{ fontFamily: 'Fredoka One', fontSize: 'clamp(30px,4vw,48px)', color: '#2d2d2d', marginBottom: 12 }}>
              Learning Wrapped in Play 🎭
            </h2>
            <p style={{ color: '#888', fontSize: 17, maxWidth: 560, margin: '0 auto' }}>From first words to first friendships — we've got a program for every stage.</p>
          </div>

          <div style={{ maxWidth: 1100, margin: '0 auto', display: 'grid', gridTemplateColumns: 'repeat(auto-fit,minmax(300px,1fr))', gap: 28 }}>
            {programs.map((p, i) => (
              <div key={p.name} className="card-hover" style={{
                background: p.color, borderRadius: 24, padding: 32,
                border: `2px solid ${p.accent}22`,
                boxShadow: `0 8px 30px ${p.accent}15`,
                animationDelay: `${i * 0.1}s`
              }}>
                <div style={{ fontSize: 52, marginBottom: 16, display: 'inline-block', animation: 'float 3s ease-in-out infinite', animationDelay: `${i * 0.3}s` }}>{p.emoji}</div>
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 10 }}>
                  <h3 style={{ fontFamily: 'Fredoka One', fontSize: 24, color: '#2d2d2d' }}>{p.name}</h3>
                  <span style={{ background: p.accent, color: '#fff', padding: '4px 12px', borderRadius: 50, fontSize: 12, fontWeight: 800 }}>{p.age}</span>
                </div>
                <p style={{ color: '#666', lineHeight: 1.7, fontSize: 15 }}>{p.desc}</p>
                <a href="#admissions" style={{ display: 'inline-block', marginTop: 20, color: p.accent, fontWeight: 800, fontSize: 14, textDecoration: 'none', borderBottom: `2px solid ${p.accent}` }}>Learn more →</a>
              </div>
            ))}
          </div>
        </section>
      );
    }

    // ── Why Choose Us
    function WhyUs() {
      const features = [
        { emoji: '🏡', title: 'Safe & Secure Campus', desc: 'CCTV monitored, child-safe furniture, fire-safe building and trained staff at every step.' },
        { emoji: '🥗', title: 'Nutritious Meals', desc: 'Healthy, home-style vegetarian meals and snacks planned by a certified nutritionist.' },
        { emoji: '📱', title: 'Daily Parent Updates', desc: 'Real-time photo updates, daily activity reports and open communication via our parent app.' },
        { emoji: '🌿', title: 'Eco-Friendly Campus', desc: 'Green spaces, kitchen garden, and sustainability education built into everyday learning.' },
        { emoji: '🧠', title: 'Trained Educators', desc: 'All teachers are B.Ed / ECCEd certified with regular training in child psychology.' },
        { emoji: '🧸', title: 'Comfortable Campus', desc: 'Our entire facility is fully air-conditioned and climate-controlled to keep your child comfortable year-round.' },
      ];
      return (
        <section style={{ padding: '90px 5%', background: '#fffbf0' }}>
          <div style={{ textAlign: 'center', marginBottom: 56 }}>
            <div style={{ display: 'inline-block', background: '#ffecf0', borderRadius: 50, padding: '6px 18px', marginBottom: 12 }}>
              <span style={{ color: '#ff6b6b', fontWeight: 800, fontSize: 13 }}>💡 WHY HAPPY DAY?</span>
            </div>
            <h2 style={{ fontFamily: 'Fredoka One', fontSize: 'clamp(30px,4vw,48px)', color: '#2d2d2d' }}>
              Everything Your Child Deserves 🌈
            </h2>
          </div>
          <div style={{ maxWidth: 1100, margin: '0 auto', display: 'grid', gridTemplateColumns: 'repeat(auto-fit,minmax(280px,1fr))', gap: 24 }}>
            {features.map((f, i) => (
              <div key={f.title} className="card-hover" style={{
                background: '#fff', borderRadius: 20, padding: '28px 24px',
                boxShadow: '0 4px 20px rgba(0,0,0,0.06)', border: '1.5px solid #f0f0f0',
                display: 'flex', gap: 18
              }}>
                <div style={{ fontSize: 40, flexShrink: 0, height: 56, width: 56, background: '#fff9e0', borderRadius: 16, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>{f.emoji}</div>
                <div>
                  <h3 style={{ fontFamily: 'Fredoka One', fontSize: 18, color: '#2d2d2d', marginBottom: 8 }}>{f.title}</h3>
                  <p style={{ color: '#777', fontSize: 14, lineHeight: 1.6 }}>{f.desc}</p>
                </div>
              </div>
            ))}
          </div>
        </section>
      );
    }

    // ── Testimonials
    function Testimonials() {
      const reviews = [
        { name: 'Priya Sharma', child: 'Aanya, 4 yrs', text: 'My daughter was so shy before Happy Day School. Now she sings, dances and can\'t wait for school every morning! The teachers are incredibly warm and caring.', stars: 5 },
        { name: 'Rohit & Meera Gupta', child: 'Dev, 3 yrs', text: 'The daily photo updates make us feel so connected. Dev has grown so much in just 6 months — his vocabulary, confidence and social skills are amazing!', stars: 5 },
        { name: 'Sunita Verma', child: 'Riya, 5 yrs', text: 'Happy Day School is the best decision we made for Riya\'s early education. The balanced mix of fun and academics truly prepares children for big school.', stars: 5 },
        { name: 'Arjun Mehta', child: 'Kabir, 4 yrs', text: 'What I love most is the focus on holistic development. Kabir learns music, yoga, art AND academics — all in one happy place. Highly recommended!', stars: 5 },

                  <span style={{ fontFamily: 'Nunito', fontWeight: 800, fontSize: 17, color: openIdx === i ? '#ff6b6b' : '#333' }}>{faq.q}</span>
                  <span style={{ fontSize: 22, color: openIdx === i ? '#ff6b6b' : '#888', transform: openIdx === i ? 'rotate(45deg)' : 'rotate(0)', transition: 'transform 0.3s' }}>
                    +
                  </span>
                </button>
                <div style={{ maxHeight: openIdx === i ? 200 : 0, overflow: 'hidden', transition: 'max-height 0.3s ease-in-out' }}>
                  <p style={{ padding: '0 24px 24px', color: '#666', lineHeight: 1.7, fontSize: 16, margin: 0 }}>{faq.a}</p>
                </div>
              </div>
            ))}
          </div>
        </section>
      );
    }

    // ── App
    function App() {
      return (
        <>
          <Navbar />
          <Hero />
          <Banner />

          <Contact />

          <a href="https://wa.me/919354677600?text=Hi! I'm interested in admissions at Happy Day School."
            target="_blank" rel="noreferrer"
            style={{
              position: 'fixed', bottom: 28, right: 28, zIndex: 999,

              background: '#25d366', display: 'flex', alignItems: 'center', justifyContent: 'center',
              fontSize: 30, boxShadow: '0 8px 25px rgba(37,211,102,0.5)',
              textDecoration: 'none', animation: 'pulse-ring 2s infinite'
            }}>💬</a>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
